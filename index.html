<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu App de Música</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #121212; color: #fff; padding: 20px; max-width: 600px; margin: 0 auto; }

    /* Campo de busca */
    h1 { text-align: center; margin: 20px 0; font-size: 22px; }
    .busca { display: flex; gap: 8px; margin-bottom: 25px; }
    input { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; background: #1e1e1e; color: #fff; }
    button { padding: 12px 20px; border: none; border-radius: 8px; background: #1db954; color: #000; font-weight: bold; cursor: pointer; }

    /* Resultados */
    .resultado { padding: 14px; margin: 8px 0; background: #1e1e1e; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .resultado:hover { background: #2a2a2a; }
    .titulo { font-weight: bold; margin-bottom: 4px; }
    .canal { font-size: 13px; color: #b3b3b3; }

    /* Modal (janela por cima) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
    .modal-conteudo { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
    .fechar { float: right; font-size: 24px; cursor: pointer; color: #aaa; }
    .fechar:hover { color: #fff; }
    .info-musica { margin: 25px 0; }
    .controles { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    .controles button { min-width: 90px; }

    /* Player invisível — só áudio, segue as regras da API */
    #player { width: 200px; height: 200px; position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <h1>🎵 Buscar Músicas</h1>

  <div class="busca">
    <input type="text" id="termo" placeholder="Nome da música ou artista...">
    <button onclick="buscar()">Buscar</button>
  </div>

  <div id="lista"></div>

  <!-- Modal do reprodutor -->
  <div id="modal" class="modal">
    <div class="modal-conteudo">
      <span class="fechar" onclick="fecharModal()">&times;</span>
      <div class="info-musica">
        <h3 id="nomeMusica">Título da Música</h3>
        <p id="nomeCanal"></p>
      </div>
      <div class="controles">
        <button onclick="pausar()">❚❚ Pausar</button>
        <button onclick="tocar()">▶️ Continuar</button>
      </div>
      <div id="player"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ⚠️ Essa chave é de exemplo — use a SUA própria chave da API do YouTube
    const CHAVE_API = "AIzaSyDWhuV8HHco14UFQlK1VTni5BpWqKnA5hE";
    let player;

    // Inicializa o player de forma válida (tamanho mínimo exigido pela API)
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '200',
        width: '200',
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          iv_load_policy: 3,
          rel: 0
        }
      });
    }

    // Busca apenas vídeos da categoria Música
    async function buscar() {
      const q = document.getElementById('termo').value.trim();
      if (!q) return;

      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&key=${CHAVE_API}&maxResults=12`;

      try {
        const res = await fetch(url);
        const dados = await res.json();
        if (dados.error) {
          alert("Erro: Verifique sua chave de API ou limites de uso.");
          return;
        }
        mostrarResultados(dados.items);
      } catch (erro) {
        alert("Falha na busca. Verifique sua conexão.");
      }
    }

    function mostrarResultados(lista) {
      const div = document.getElementById('lista');
      div.innerHTML = "";
      lista.forEach(item => {
        const id = item.id.videoId;
        const titulo = item.snippet.title.replace(/"/g, '&quot;');
        const canal = item.snippet.channelTitle.replace(/"/g, '&quot;');
        div.innerHTML += `
          <div class="resultado" onclick="abrirPlayer('${id}', '${titulo}', '${canal}')">
            <div class="titulo">${item.snippet.title}</div>
            <div class="canal">${item.snippet.channelTitle}</div>
          </div>`;
      });
    }

    function abrirPlayer(id, titulo, canal) {
      document.getElementById('nomeMusica').textContent = titulo;
      document.getElementById('nomeCanal').textContent = canal;
      document.getElementById('modal').style.display = "flex";
      player.loadVideoById(id);
      player.playVideo();
    }

    function fecharModal() {
      document.getElementById('modal').style.display = "none";
      player.pauseVideo();
    }

    function pausar() { player.pauseVideo(); }
    function tocar() { player.playVideo(); }
  </script>

</body>
</html>
