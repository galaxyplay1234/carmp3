<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu App de Música</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
    #player { margin: 20px 0; }
    input { padding: 8px; width: 70%; }
    button { padding: 8px 16px; cursor: pointer; }
    .resultado { margin: 10px 0; padding: 10px; border: 1px solid #eee; border-radius: 4px; }
  </style>
</head>
<body>

  <h1>🎵 Buscar e Ouvir Músicas</h1>

  <input type="text" id="busca" placeholder="Digite o nome da música ou artista...">
  <button onclick="buscarMusicas()">Buscar</button>

  <div id="resultados"></div>
  <div id="player"></div>

  <!-- Carrega a API do Player do YouTube -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const CHAVE_API = "AIzaSyDWhuV8HHco14UFQlK1VTni5BpWqKnA5hE"; // Substitua pela sua chave
    let player;

    // Inicializa o player
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', { height: '315', width: '100%' });
    }

    // Busca vídeos na API
    async function buscarMusicas() {
      const termo = document.getElementById('busca').value.trim();
      if (!termo) return;

      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(termo)}&type=video&videoCategoryId=10&key=${CHAVE_API}&maxResults=10`;

      try {
        const resposta = await fetch(url);
        const dados = await resposta.json();
        mostrarResultados(dados.items);
      } catch (erro) {
        document.getElementById('resultados').innerHTML = "Erro ao buscar. Verifique sua chave de API.";
      }
    }

    // Exibe os resultados
    function mostrarResultados(lista) {
      const div = document.getElementById('resultados');
      div.innerHTML = "";

      lista.forEach(item => {
        const titulo = item.snippet.title;
        const idVideo = item.id.videoId;
        const canal = item.snippet.channelTitle;

        div.innerHTML += `
          <div class="resultado" onclick="reproduzir('${idVideo}')">
            <strong>${titulo}</strong><br>
            <small>Canal: ${canal}</small>
          </div>
        `;
      });
    }

    // Reproduz o vídeo selecionado
    function reproduzir(id) {
      player.loadVideoById(id);
      player.playVideo();
    }
  </script>

</body>
</html>
