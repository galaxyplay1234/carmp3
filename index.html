<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Galaxy Music</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div id="app">

<header>

<h1>Galaxy Music</h1>

<div class="search">

<i class="fa fa-search"></i>

<input
id="searchInput"
placeholder="Pesquisar">

</div>

</header>

<section id="playlistHeader">

<img
id="playlistCover"
src="https://placehold.co/500x500">

<div>

<h2 id="playlistTitle">

Topnejo

</h2>

<p id="playlistDescription">

As sertanejas mais tocadas.

</p>

<button id="playAll">

<i class="fa fa-play"></i>

Ouvir Tudo

</button>

</div>

</section>

<section>

<h3>Músicas</h3>

<div id="musicList">

</div>

</section>

</div>

<div id="player">

<div class="left">

<img
id="cover"
src="https://placehold.co/300">

<div>

<h4 id="musicTitle">

Nenhuma música

</h4>

<p id="musicArtist">

Galaxy Music

</p>

</div>

</div>

<div class="center">

<button id="prev">

<i class="fa fa-backward"></i>

</button>

<button id="play">

<i class="fa fa-play"></i>

</button>

<button id="next">

<i class="fa fa-forward"></i>

</button>

</div>

</div>

<div
id="youtube-player"
style="display:none"></div>

<script src="app.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>

</html>
